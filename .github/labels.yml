# Labels for python-playground
# Apply via: gh label create --force < label_name
# Or use: https://github.com/bekalu73/python-playground/issues/labels

- name: bug
  color: d73a4a
  description: Something is broken or incorrect

- name: enhancement
  color: a2eeef
  description: New topic or feature request

- name: help wanted
  color: 008672
  description: Looking for contributors

- name: good first issue
  color: 7057ff
  description: Great for newcomers

- name: documentation
  color: 0075ca
  description: Docs, typos, or formatting improvements

- name: question
  color: d876e3
  description: Further information is requested

- name: wontfix
  color: ffffff
  description: Will not be worked on

- name: duplicate
  color: cfd3d7
  description: Duplicate of another issue
